<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — TecBall 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-green-700 to-green-900 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">
        <div class="text-center mb-8">
            <div class="text-5xl mb-3">⚽</div>
            <h1 class="text-2xl font-bold text-gray-800">Criar conta</h1>
            <p class="text-gray-500 text-sm">TecBall — Copa do Mundo 2026</p>
        </div>

        {% if error %}
        <div class="bg-red-50 text-red-600 text-sm rounded-lg p-3 mb-4 border border-red-200">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/auth/register" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nome completo</label>
                <input type="text" name="name" required minlength="2"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
                    placeholder="João Silva">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required
                    class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
                    placeholder="seu@email.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                <input type="password" name="password" required minlength="8"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
                    placeholder="Mínimo 8 caracteres">
            </div>
            <button type="submit"
                class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2.5 rounded-lg transition-colors">
                Criar conta
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            Já tem conta?
            <a href="/auth/login" class="text-green-600 hover:underline font-medium">Entrar</a>
        </p>
    </div>
</body>
</html>
